<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

  /* Estilos para a Calculadora Oculta */
  .calculator-widget {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 1000;
  }

  .calc-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;

      transition: all 0.2s ease;

  .calc-btn:hover {

      transform: scale(1.05);
  }

  .calc-panel {
      position: absolute;
      bottom: 60px;
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://contas-2026-43a86-default-rtdb.firebaseio.com/",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'dados_financeiros');
  const connectedRef = ref(db, '.info/connected');

  window.saveToCloud = async function(dados) {
    window.setSyncState?.('saving', 'Salvando…');
    try {
      await set(dbRef, dados);
      window.setSyncState?.('online', 'Sincronizado');
    } catch (error) {
      console.error('Falha ao sincronizar:', error);
      window.setSyncState?.('error', 'Salvo neste dispositivo');
      window.showToast?.('Sem conexão: a alteração ficou salva neste dispositivo.');
      throw error;
    }
  };

  onValue(connectedRef, (snapshot) => {
    window.setSyncState?.(snapshot.val() ? 'online' : 'error', snapshot.val() ? 'Sincronizado' : 'Modo local');
  });

  onValue(dbRef, (snapshot) => {
    const cloudData = snapshot.val();
    if (cloudData) {
      window.data = window.normalizeData(cloudData);
      localStorage.setItem('contas2026', JSON.stringify(window.data));
      window.render();
      window.setSyncState?.('online', 'Sincronizado');
    }
  }, (error) => {
    console.error('Falha ao carregar dados da nuvem:', error);
    window.setSyncState?.('error', 'Modo local');
  });
</script>

<header>
  <div class="logo">Contas <span>2026 · seu painel financeiro</span></div>
  <div class="header-right">
    <div class="sync-pill" id="sync-pill" title="Estado da sincronização"><span class="sync-dot"></span><span class="sync-text" id="sync-text">Conectando…</span></div>
    <button class="btn btn-icon" type="button" onclick="toggleTheme()" id="theme-button" aria-label="Alternar tema" title="Alternar tema"><i class="fas fa-sun" id="theme-icon"></i></button>
    <button class="btn btn-secondary" type="button" onclick="document.getElementById('import-file').click()"><i class="fas fa-upload"></i> <span class="btn-label">Importar</span></button>
    <input class="sr-only" id="import-file" type="file" accept="application/json,.json" onchange="importData(event)">
    <button class="btn btn-secondary" type="button" onclick="exportData()"><i class="fas fa-download"></i> <span class="btn-label">Exportar</span></button>
    <button class="btn btn-accent" type="button" onclick="openModal()"><i class="fas fa-plus"></i> Nova conta</button>
  </div>
</header>

<div class="app">
  <aside>
    <div class="sidebar-menu" id="sidebar-months"></div>
    <button class="month-btn" type="button" onclick="showAnnual()" id="btn-annual"><i class="fas fa-chart-pie" style="margin-right:8px;"></i> Anual</button>
  </aside>
  <main id="main-content"></main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeModal()" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h2 id="modal-title">Nova Conta</h2>
    <div class="form-row"><label for="f-desc">Descrição</label><input id="f-desc" type="text" autocomplete="off" maxlength="80" required></div>
    <div class="form-row"><label for="f-valor">Valor (R$)</label><input id="f-valor" type="number" min="0.01" step="0.01" inputmode="decimal" required></div>
    <div class="form-row"><label for="f-venc">Vencimento</label><input id="f-venc" type="date"></div>
    
    <div style="display: flex; gap: 10px;">
        <div class="form-row" style="flex: 1;">
          <label for="f-mes">Mês inicial</label>
          <select id="f-mes">
            <option>JANEIRO</option><option>FEVEREIRO</option><option>MARÇO</option>
            <option>ABRIL</option><option>MAIO</option><option>JUNHO</option>
            <option>JULHO</option><option>AGOSTO</option><option>SETEMBRO</option>
            <option>OUTUBRO</option><option>NOVEMBRO</option><option>DEZEMBRO</option>
          </select>
        </div>
        
        <div class="form-row" style="flex: 1;">
          <label for="f-parcelas">Parcelas (meses)</label>
          <input id="f-parcelas" type="number" min="1" max="12" value="1" inputmode="numeric">
        </div>
    </div>

    <div class="form-row">
      <label for="f-status">Status</label>
      <select id="f-status">
        <option value="pendente">Pendente</option>
        <option value="pago">Pago</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" type="button" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" type="button" onclick="saveItem()">Salvar</button>
    </div>
  </div>
</div>

<!-- Calculadora Flutuante -->
<div class="calculator-widget">
    <button class="calc-btn" type="button" onclick="toggleCalc()" title="Calculadora" aria-label="Abrir calculadora" aria-expanded="false" aria-controls="calc-panel">
        <i class="fas fa-calculator"></i>
    </button>
    <div class="calc-panel" id="calc-panel" aria-label="Calculadora" role="region">
        <div class="calc-display" id="calc-display" aria-live="polite">0</div>
        <div class="calc-grid">
            <button class="calc-key" onclick="calcInput('C')">C</button>
            <button class="calc-key" onclick="calcInput('DEL')">⌫</button>
            <button class="calc-key operator" onclick="calcInput('/')">÷</button>
            <button class="calc-key operator" onclick="calcInput('*')">×</button>
            
            <button class="calc-key" onclick="calcInput('7')">7</button>
            <button class="calc-key" onclick="calcInput('8')">8</button>
            <button class="calc-key" onclick="calcInput('9')">9</button>
            <button class="calc-key operator" onclick="calcInput('-')">-</button>
            
            <button class="calc-key" onclick="calcInput('4')">4</button>
            <button class="calc-key" onclick="calcInput('5')">5</button>
            <button class="calc-key" onclick="calcInput('6')">6</button>
            <button class="calc-key operator" onclick="calcInput('+')">+</button>
            
            <button class="calc-key" onclick="calcInput('1')">1</button>
            <button class="calc-key" onclick="calcInput('2')">2</button>
            <button class="calc-key" onclick="calcInput('3')">3</button>
            <button class="calc-key equal" style="grid-row: span 2;" onclick="calcInput('=')">=</button>
            
            <button class="calc-key" style="grid-column: span 2;" onclick="calcInput('0')">0</button>
            <button class="calc-key" onclick="calcInput('.')">.</button>
        </div>
    </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const APP_YEAR = 2026;
const MONTHS = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
const MONTH_SHORT = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

window.normalizeData = function(source = {}) {
  const normalized = {};
  MONTHS.forEach(month => {
    const entry = source?.[month] || {};
    normalized[month] = {
      renda: Number.isFinite(Number(entry.renda)) ? Math.max(0, Number(entry.renda)) : 0,
      contas: Array.isArray(entry.contas) ? entry.contas.map(item => ({
        id: /^[a-z0-9_-]{1,80}$/i.test(String(item.id || '')) ? String(item.id) : uid(),
        desc: String(item.desc || 'Conta sem descrição').slice(0, 80),
        valor: Number.isFinite(Number(item.valor)) ? Math.max(0, Number(item.valor)) : 0,
        venc: /^\d{4}-\d{2}-\d{2}$/.test(String(item.venc || '')) ? String(item.venc) : '',
        status: item.status === 'pago' ? 'pago' : 'pendente'
      })) : []
    };
  });
  return normalized;
};

let localData = {};
try {
  localData = JSON.parse(localStorage.getItem('contas2026')) || {};
} catch (error) {
  console.warn('Backup local inválido; iniciando uma base vazia.', error);
}
window.data = window.normalizeData(localData);

let currentMonth = new Date().getFullYear() === APP_YEAR ? MONTHS[new Date().getMonth()] : MONTHS[0];
let viewMode = 'month';
let editingId = null;
let editingMonth = null;
let listFilter = 'todas';
let searchTerm = '';
let toastTimer = null;
let modalTrigger = null;

function save() {
  localStorage.setItem('contas2026', JSON.stringify(window.data));
  if (window.saveToCloud) window.saveToCloud(window.data).catch(() => {});
  else setSyncState('error', 'Salvo localmente');
}

window.setSyncState = function(state, text) {
  const pill = document.getElementById('sync-pill');
  const label = document.getElementById('sync-text');
  if (!pill || !label) return;
  pill.className = `sync-pill ${state || ''}`;
  label.textContent = text;
  pill.title = text;
};

window.showToast = function(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  clearTimeout(toastTimer);
  toast.textContent = message;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}

function totals(month) {
  const d = window.data[month] || { renda:0, contas:[] };
  const total = d.contas.reduce((s,c) => s + (c.valor||0), 0);
  const pago = d.contas.filter(c=>c.status==='pago').reduce((s,c)=>s+(c.valor||0),0);
  const pendente = total - pago;
  const saldo = (d.renda||0) - total;
  return { total, pago, pendente, saldo, renda: d.renda||0 };
}

function getStatus(conta) {
  if (conta.status === 'pago') return 'pago';
  if (conta.venc) {
    const today = new Date(); today.setHours(0,0,0,0);
    const v = new Date(conta.venc + 'T00:00:00');
    if (v < today) return 'vencido';
  }
  return 'pendente';
}

function escapeHTML(value) {
  return String(value).replace(/[&<>'"]/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  })[char]);
}

function normalizeForSearch(value) {
  return String(value).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function setFilter(filter) {
  listFilter = filter;
  renderMonth(currentMonth);
}

function setSearch(value) {
  searchTerm = value;
  renderMonth(currentMonth);
  requestAnimationFrame(() => {
    const input = document.getElementById('account-search');
    if (input) {
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }
  });
}

window.render = function() {
  renderSidebar();
  if (viewMode === 'annual') renderAnnual();
  else renderMonth(currentMonth);
}

function renderSidebar() {
  const el = document.getElementById('sidebar-months');
  el.innerHTML = MONTHS.map(m => {
    const t = totals(m);
    const badgeCls = t.saldo > 0 ? 'badge-pos' : t.saldo < 0 ? 'badge-neg' : 'badge-zero';
    const active = viewMode === 'month' && m === currentMonth ? 'active' : '';
    const valStr = t.saldo !== 0 ? (t.saldo > 0 ? '+' : '') + fmtShort(t.saldo) : '—';
    return `<button class="month-btn ${active}" type="button" onclick="goMonth('${m}')" ${active ? 'aria-current="page"' : ''}>
      ${m.charAt(0)+m.slice(1).toLowerCase()}
      <span class="month-badge ${badgeCls}">${valStr}</span>
    </button>`;
  }).join('');
  const annualButton = document.getElementById('btn-annual');
  annualButton.className = 'month-btn' + (viewMode==='annual'?' active':'');
  if (viewMode === 'annual') annualButton.setAttribute('aria-current', 'page');
  else annualButton.removeAttribute('aria-current');
  
  // Auto-scrola a barra de meses no mobile para o mês ativo
  if(viewMode === 'month') {
    setTimeout(() => {
      const activeBtn = el.querySelector('.month-btn.active');
      if(activeBtn && window.innerWidth <= 768) {
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        activeBtn.scrollIntoView({ behavior: reducedMotion ? 'auto' : 'smooth', block: 'nearest', inline: 'center' });
      }
    }, 100);
  }
}

function renderMonth(month) {
  const d = window.data[month];
  const t = totals(month);
  const pct = t.total > 0 ? Math.round((t.pago/t.total)*100) : 0;
  const incomePct = t.renda > 0 ? Math.round((t.total/t.renda)*100) : 0;
  const sorted = [...d.contas].sort((a,b)=>{
    const sa = getStatus(a), sb = getStatus(b);
    const order = {vencido:0, pendente:1, pago:2};
    if (order[sa]!==order[sb]) return order[sa]-order[sb];
    return (a.venc && b.venc) ? new Date(a.venc)-new Date(b.venc) : 0;
  });
  const statusCounts = sorted.reduce((acc, item) => {
    acc[getStatus(item)]++;
    return acc;
  }, { pago: 0, pendente: 0, vencido: 0 });
  const query = normalizeForSearch(searchTerm.trim());
  const filtered = sorted.filter(item => {
    const matchesStatus = listFilter === 'todas' || getStatus(item) === listFilter;
    const matchesSearch = !query || normalizeForSearch(item.desc).includes(query);
    return matchesStatus && matchesSearch;
  });

  const mainEl = document.getElementById('main-content');
  
  // HTML comum do cabeçalho de resumo
  let baseHTML = `
    <div class="section-header"><div class="section-title">${month} <span>${APP_YEAR}</span></div></div>
    <div class="renda-row"><label for="monthly-income">Renda do mês (R$)</label><input id="monthly-income" class="renda-input" type="number" min="0" step="0.01" inputmode="decimal" value="${t.renda}" onchange="updateRenda('${month}', this.value)"></div>
    <div class="cards">
        <div class="card c-total"><div class="card-label">Contas do mês</div><div class="card-value">${fmt(t.total)}</div><div class="card-detail">${d.contas.length} ${d.contas.length === 1 ? 'lançamento' : 'lançamentos'}</div></div>
        <div class="card c-paid"><div class="card-label">Pago</div><div class="card-value positive">${fmt(t.pago)}</div><div class="card-detail">${pct}% das contas</div></div>
        <div class="card c-pending"><div class="card-label">A pagar</div><div class="card-value" style="color:var(--orange)">${fmt(t.pendente)}</div><div class="card-detail">${statusCounts.vencido ? `${statusCounts.vencido} ${statusCounts.vencido === 1 ? 'vencida' : 'vencidas'}` : 'Nenhuma vencida'}</div></div>
        <div class="card c-saldo"><div class="card-label">Saldo previsto</div><div class="card-value ${t.saldo>=0?'positive':'negative'}">${fmt(t.saldo)}</div><div class="card-detail">${t.renda > 0 ? `${incomePct}% da renda comprometida` : 'Informe sua renda'}</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-label"><span>Progresso dos pagamentos</span><strong>${pct}% pago</strong></div><div class="progress-bar" role="progressbar" aria-label="Percentual das contas pagas" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${pct}"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  `;

  let toolbarHTML = `
    <div class="list-toolbar">
      <div class="filters" role="group" aria-label="Filtrar contas por status">
        <button type="button" class="filter-btn ${listFilter === 'todas' ? 'active' : ''}" onclick="setFilter('todas')">Todas ${sorted.length}</button>
        <button type="button" class="filter-btn ${listFilter === 'pendente' ? 'active' : ''}" onclick="setFilter('pendente')">Pendentes ${statusCounts.pendente}</button>
        <button type="button" class="filter-btn ${listFilter === 'vencido' ? 'active' : ''}" onclick="setFilter('vencido')">Vencidas ${statusCounts.vencido}</button>
        <button type="button" class="filter-btn ${listFilter === 'pago' ? 'active' : ''}" onclick="setFilter('pago')">Pagas ${statusCounts.pago}</button>
      </div>
      <label class="search-wrap" for="account-search"><i class="fas fa-search" aria-hidden="true"></i><span class="sr-only">Buscar conta</span><input class="search-input" id="account-search" type="search" placeholder="Buscar conta…" value="${escapeHTML(searchTerm)}" oninput="setSearch(this.value)"></label>
    </div>`;

  // Render para Computadores (Tabela)
  let tableHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Descrição</th><th>Vencimento</th><th style="text-align:right">Valor</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>
          ${filtered.length === 0 ? `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-inbox" aria-hidden="true"></i><strong>Nenhuma conta encontrada</strong><span>${sorted.length ? 'Ajuste os filtros ou a busca.' : 'Cadastre sua primeira conta para começar.'}</span></div></td></tr>` : ''}
          ${filtered.map(c => {
            const st = getStatus(c);
            const stLabel = st === 'pago' ? '<i class="fas fa-check" style="margin-right:4px;"></i> Pago' : 
                            st === 'vencido' ? '<i class="fas fa-exclamation-triangle" style="margin-right:4px;"></i> Vencido' : 
                            '<i class="far fa-circle" style="margin-right:4px;"></i> Pendente';
                            
            return `<tr>
              <td class="td-desc">${escapeHTML(c.desc)}</td><td><span class="td-date">${fmtDate(c.venc)}</span></td><td class="td-valor">${fmt(c.valor)}</td>
              <td class="td-status"><button type="button" class="status ${st}" onclick="toggleStatus('${month}','${c.id}')" aria-label="Alterar status de ${escapeHTML(c.desc)}">${stLabel}</button></td>
              <td class="td-actions">
                <button type="button" class="icon-btn" onclick="openEdit('${month}','${c.id}')" aria-label="Editar ${escapeHTML(c.desc)}" title="Editar"><i class="fas fa-pen"></i></button>
                <button type="button" class="icon-btn del" onclick="deleteItem('${month}','${c.id}')" aria-label="Excluir ${escapeHTML(c.desc)}" title="Excluir"><i class="fas fa-trash"></i></button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  // Render para Celulares (Lista de Cards Dinâmicos)
  let mobileListHTML = `
    <div class="mobile-list">
      ${filtered.length === 0 ? `<div class="empty-state"><i class="fas fa-inbox" aria-hidden="true"></i><strong>Nenhuma conta encontrada</strong><span>${sorted.length ? 'Ajuste os filtros ou a busca.' : 'Cadastre sua primeira conta para começar.'}</span></div>` : ''}
      ${filtered.map(c => {
        const st = getStatus(c);
        const stLabel = st === 'pago' ? '<i class="fas fa-check" style="margin-right:4px;"></i> Pago' : 
                        st === 'vencido' ? '<i class="fas fa-exclamation-triangle" style="margin-right:4px;"></i> Vencido' : 
                        '<i class="far fa-circle" style="margin-right:4px;"></i> Pendente';
                        
        return `
          <div class="mobile-card">
            <div class="mobile-card-top">
              <div>
                <div class="mobile-card-title">${escapeHTML(c.desc)}</div>
                <div class="mobile-card-date">Venc: ${fmtDate(c.venc)}</div>
              </div>
              <div class="mobile-card-value">${fmt(c.valor)}</div>
            </div>
            <div class="mobile-card-actions">
              <button type="button" class="status ${st}" onclick="toggleStatus('${month}','${c.id}')" aria-label="Alterar status de ${escapeHTML(c.desc)}">${stLabel}</button>
              <div>
                <button type="button" class="icon-btn" onclick="openEdit('${month}','${c.id}')" style="padding:6px 10px;" aria-label="Editar ${escapeHTML(c.desc)}"><i class="fas fa-pen"></i></button>
                <button type="button" class="icon-btn del" onclick="deleteItem('${month}','${c.id}')" style="padding:6px 10px; margin-left:6px;" aria-label="Excluir ${escapeHTML(c.desc)}"><i class="fas fa-trash"></i></button>
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>`;

  mainEl.innerHTML = baseHTML + toolbarHTML + tableHTML + mobileListHTML;
}

function renderAnnual() {
  const annualTotal = MONTHS.reduce((s,m) => s + totals(m).total, 0);
  const annualRenda = MONTHS.reduce((s,m) => s + (window.data[m].renda||0), 0);
  const annualPaid = MONTHS.reduce((s,m) => s + totals(m).pago, 0);
  const annualPending = annualTotal - annualPaid;
  const annualSaldo = annualRenda - annualTotal;
  const annualPct = annualTotal > 0 ? Math.round((annualPaid / annualTotal) * 100) : 0;
  document.getElementById('main-content').innerHTML = `
    <div class="section-header"><div class="section-title">Visão <span>Anual ${APP_YEAR}</span></div></div>
    <div class="cards">
      <div class="card c-total"><div class="card-label">Contas no ano</div><div class="card-value">${fmt(annualTotal)}</div><div class="card-detail">${MONTHS.reduce((s,m) => s + window.data[m].contas.length, 0)} lançamentos</div></div>
      <div class="card c-paid"><div class="card-label">Pago no ano</div><div class="card-value positive">${fmt(annualPaid)}</div><div class="card-detail">${annualPct}% concluído</div></div>
      <div class="card c-pending"><div class="card-label">A pagar</div><div class="card-value" style="color:var(--orange)">${fmt(annualPending)}</div><div class="card-detail">Pagamentos restantes</div></div>
      <div class="card c-saldo"><div class="card-label">Saldo previsto</div><div class="card-value ${annualSaldo>=0?'positive':'negative'}">${fmt(annualSaldo)}</div><div class="card-detail">Renda informada: ${fmt(annualRenda)}</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-label"><span>Progresso anual</span><strong>${annualPct}% pago</strong></div><div class="progress-bar" role="progressbar" aria-label="Percentual anual pago" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${annualPct}"><div class="progress-fill" style="width:${annualPct}%"></div></div></div>
    <div class="annual-grid">${MONTHS.map((m,i)=>{
        const t = totals(m);
        return `<button type="button" class="annual-cell" onclick="goMonth('${m}')" aria-label="Abrir ${m.toLowerCase()}"><div class="annual-cell-name">${MONTH_SHORT[i]}</div><div class="annual-cell-val ${t.saldo>=0?'pos':'neg'}">${fmtShort(t.saldo)}</div><div class="annual-cell-meta">${t.total ? `${Math.round((t.pago/t.total)*100)}% pago` : 'sem contas'}</div></button>`;
    }).join('')}</div>`;
}

function goMonth(m) { currentMonth = m; viewMode = 'month'; listFilter = 'todas'; searchTerm = ''; render(); }
function showAnnual() { viewMode = 'annual'; render(); }
function toggleStatus(month, id) {
  const c = window.data[month].contas.find(x=>x.id===id);
  if (c) {
    c.status = c.status === 'pago' ? 'pendente' : 'pago';
    save();
    render();
    showToast(c.status === 'pago' ? 'Conta marcada como paga.' : 'Conta reaberta como pendente.');
  }
}
function updateRenda(month, val) {
  window.data[month].renda = Math.max(0, parseFloat(val) || 0);
  save();
  render();
  showToast('Renda atualizada.');
}
function deleteItem(month, id) {
  const item = window.data[month].contas.find(c => c.id === id);
  if(item && confirm(`Apagar “${item.desc}”? Esta ação não pode ser desfeita.`)) {
    window.data[month].contas = window.data[month].contas.filter(c=>c.id!==id);
    save();
    render();
    showToast('Conta excluída.');
  }
}

function openModal(month) {
  editingId = null;
  editingMonth = null;
  modalTrigger = document.activeElement;
  document.getElementById('modal-title').innerText = "Nova Conta";
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.getElementById('f-desc').value = ''; 
  document.getElementById('f-valor').value = '';
  document.getElementById('f-venc').value = '';
  document.getElementById('f-mes').value = month || currentMonth;
  document.getElementById('f-status').value = 'pendente';
  
  // Reseta as parcelas e habilita edição
  const fParcelas = document.getElementById('f-parcelas');
  fParcelas.value = 1;
  fParcelas.disabled = false;
  fParcelas.parentElement.style.opacity = "1";
  requestAnimationFrame(() => document.getElementById('f-desc').focus());
}

function openEdit(month, id) {
  const c = window.data[month].contas.find(x=>x.id===id);
  if (!c) return;
  editingId = id;
  editingMonth = month;
  modalTrigger = document.activeElement;
  document.getElementById('modal-title').innerText = "Editar Conta";
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.getElementById('f-desc').value = c.desc; 
  document.getElementById('f-valor').value = c.valor;
  document.getElementById('f-venc').value = c.venc || ''; 
  document.getElementById('f-mes').value = month;
  document.getElementById('f-status').value = c.status || 'pendente';
  
  // Desabilita as parcelas na edição (pois já foram geradas)
  const fParcelas = document.getElementById('f-parcelas');
  fParcelas.value = 1;
  fParcelas.disabled = true;
  fParcelas.parentElement.style.opacity = "0.5";
  requestAnimationFrame(() => document.getElementById('f-desc').focus());
}
function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  modalTrigger?.focus?.();
}

function addMonthsClamped(dateString, offset) {
  if (!dateString || offset === 0) return dateString;
  const [year, month, day] = dateString.split('-').map(Number);
  const target = new Date(Date.UTC(year, month - 1 + offset, 1));
  const lastDay = new Date(Date.UTC(target.getUTCFullYear(), target.getUTCMonth() + 1, 0)).getUTCDate();
  const safeDay = Math.min(day, lastDay);
  return `${target.getUTCFullYear()}-${String(target.getUTCMonth() + 1).padStart(2, '0')}-${String(safeDay).padStart(2, '0')}`;
}

function saveItem() {
  const desc = document.getElementById('f-desc').value.trim();
  const valor = parseFloat(document.getElementById('f-valor').value) || 0;
  const venc = document.getElementById('f-venc').value;
  const mes = document.getElementById('f-mes').value;
  const status = document.getElementById('f-status').value;
  const parcelas = Math.min(12, Math.max(1, parseInt(document.getElementById('f-parcelas').value) || 1));

  if(!desc) { showToast('Digite uma descrição para a conta.'); document.getElementById('f-desc').focus(); return; }
  if(valor <= 0) { showToast('Informe um valor maior que zero.'); document.getElementById('f-valor').focus(); return; }

  if (editingId) {
    const sourceMonth = editingMonth || mes;
    const sourceList = window.data[sourceMonth].contas;
    const itemIndex = sourceList.findIndex(x => x.id === editingId);
    if (itemIndex >= 0) {
      const updated = {...sourceList[itemIndex], desc, valor, venc, status};
      sourceList.splice(itemIndex, 1);
      window.data[mes].contas.push(updated);
      currentMonth = mes;
    }
  } else {
    const mesIndex = MONTHS.indexOf(mes);
    const actualInstallments = Math.min(parcelas, MONTHS.length - mesIndex);

    for (let i = 0; i < actualInstallments; i++) {
      const mesDestino = MONTHS[mesIndex + i];
      const descParcela = actualInstallments > 1 ? `${desc} (${i + 1}/${actualInstallments})` : desc;
      window.data[mesDestino].contas.push({
        id: uid(),
        desc: descParcela,
        valor,
        venc: addMonthsClamped(venc, i),
        status: i === 0 ? status : 'pendente'
      });
    }
    if (actualInstallments < parcelas) showToast(`Foram criadas ${actualInstallments} parcelas até dezembro.`);
  }
  save();
  closeModal();
  render();
  showToast(editingId ? 'Conta atualizada.' : parcelas > 1 ? 'Parcelas adicionadas.' : 'Conta adicionada.');
}

function exportData() {
  const blob = new Blob([JSON.stringify(window.data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup_contas_${APP_YEAR}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 0);
  showToast('Backup exportado.');
}

async function importData(event) {
  const file = event.target.files?.[0];
  event.target.value = '';
  if (!file) return;
  try {
    const parsed = JSON.parse(await file.text());
    if (!parsed || typeof parsed !== 'object' || !MONTHS.some(month => month in parsed)) throw new Error('Formato inválido');
    if (!confirm('Restaurar este backup? Os dados atuais serão substituídos.')) return;
    window.data = window.normalizeData(parsed);
    listFilter = 'todas';
    searchTerm = '';
    save();
    render();
    showToast('Backup restaurado com sucesso.');
  } catch (error) {
    console.error('Falha ao importar backup:', error);
    showToast('Não foi possível importar: selecione um backup válido.');
  }
}

function updateThemeButton() {
  const icon = document.getElementById('theme-icon');
  if (!icon) return;
  const isLight = document.documentElement.dataset.theme === 'light';
  icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
  document.getElementById('theme-button').title = isLight ? 'Usar tema escuro' : 'Usar tema claro';
}

function toggleTheme() {
  const nextTheme = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = nextTheme;
  localStorage.setItem('contas2026-theme', nextTheme);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', nextTheme === 'light' ? '#f4f1ea' : '#0f0f0f');
  updateThemeButton();
}

function fmt(v) { return 'R$ ' + (v||0).toLocaleString('pt-BR', {minimumFractionDigits:2}); }
function fmtShort(v) { 
  if (Math.abs(v) >= 1000) return (v/1000).toFixed(1) + 'k';
  return v.toFixed(0);
}
function fmtDate(d) { if(!d) return '—'; const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y}`; }

// LÓGICA DA CALCULADORA
let calcValue = '0';
let calcPendingOp = null;
let calcPrevValue = null;
let calcWaitingForNewValue = false;

function toggleCalc() {
    const panel = document.getElementById('calc-panel');
    panel.classList.toggle('open');
    document.querySelector('.calc-btn').setAttribute('aria-expanded', String(panel.classList.contains('open')));
}

function updateCalcDisplay() {
    document.getElementById('calc-display').innerText = calcValue;
}

function calcInput(val) {
    if (calcValue === 'Erro' && !['C', 'DEL'].includes(val)) {
        calcValue = '0';
        calcPendingOp = null;
        calcPrevValue = null;
        calcWaitingForNewValue = false;
    }
    if (val === 'C') {
        calcValue = '0';
        calcPendingOp = null;
        calcPrevValue = null;
    } else if (val === 'DEL') {
        if (calcValue.length > 1) {
            calcValue = calcValue.slice(0, -1);
        } else {
            calcValue = '0';
        }
    } else if (['+', '-', '*', '/'].includes(val)) {
        if (calcPendingOp && !calcWaitingForNewValue) {
            calcExecute();
        }
        calcPrevValue = parseFloat(calcValue);
        calcPendingOp = val;
        calcWaitingForNewValue = true;
    } else if (val === '=') {
        if (calcPendingOp) {
            calcExecute();
            calcPendingOp = null;
        }
    } else {
        // Números e ponto
        if (calcWaitingForNewValue) {
            calcValue = val === '.' ? '0.' : val;
            calcWaitingForNewValue = false;
        } else {
            if (val === '.' && calcValue.includes('.')) return;
            calcValue = calcValue === '0' && val !== '.' ? val : calcValue + val;
        }
    }
    updateCalcDisplay();
}

function calcExecute() {
    const curr = parseFloat(calcValue);
    let res = 0;
    switch(calcPendingOp) {
        case '+': res = calcPrevValue + curr; break;
        case '-': res = calcPrevValue - curr; break;
        case '*': res = calcPrevValue * curr; break;
        case '/':
          if (curr === 0) {
            calcValue = 'Erro';
            calcPendingOp = null;
            calcPrevValue = null;
            calcWaitingForNewValue = true;
            showToast('Não é possível dividir por zero.');
            return;
          }
          res = calcPrevValue / curr;
          break;
    }
    calcValue = res.toString();
    // Limita casas decimais para não quebrar o layout
    if(calcValue.includes('.') && calcValue.split('.')[1].length > 4) {
        calcValue = res.toFixed(4).replace(/\.?0+$/, '');
    }
    calcWaitingForNewValue = true;
}

// Fechar calculadora se clicar fora
document.addEventListener('click', function(e) {
    const widget = document.querySelector('.calculator-widget');
    const panel = document.getElementById('calc-panel');
    if (widget && !widget.contains(e.target) && panel.classList.contains('open')) {
        panel.classList.remove('open');
        document.querySelector('.calc-btn').setAttribute('aria-expanded', 'false');
    }
});

document.addEventListener('keydown', function(e) {
  const overlay = document.getElementById('modal-overlay');
  const panel = document.getElementById('calc-panel');

  if (e.key === 'Escape') {
    if (overlay.classList.contains('open')) closeModal();
    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      document.querySelector('.calc-btn').setAttribute('aria-expanded', 'false');
    }
    return;
  }

  if (overlay.classList.contains('open')) {
    if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
      e.preventDefault();
      saveItem();
    }
    if (e.key === 'Tab') {
      const focusable = [...overlay.querySelectorAll('button, input, select')].filter(el => !el.disabled);
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
    return;
  }

  if (panel.classList.contains('open')) {
    if (/^[0-9.+\-*/]$/.test(e.key)) { e.preventDefault(); calcInput(e.key); }
    else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calcInput('='); }
    else if (e.key === 'Backspace') { e.preventDefault(); calcInput('DEL'); }
  }
});

updateThemeButton();
render();
</script>
